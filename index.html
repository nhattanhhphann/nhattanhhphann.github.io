<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỷ Niệm 12A1</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pattaya&family=Quicksand:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background: #fff5f7; margin: 0; }
        .font-pattaya { font-family: 'Pattaya', sans-serif; }
        .gallery-scroll::-webkit-scrollbar { width: 4px; }
        .gallery-scroll::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 10px; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- KHỞI TẠO FIREBASE ---
        let db;
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            if (firebaseConfig) {
                const app = firebase.initializeApp(firebaseConfig);
                db = firebase.firestore(app);
            }
        } catch (e) { console.error("Lỗi Firebase:", e); }

        // Thành phần hiển thị Icon Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        // --- DỮ LIỆU GỐC CỦA BẠN (Dán mảng đầy đủ của bạn vào đây) ---
        const MEMBERS = [
            { id: 1, name: "Cô Ngọc Lan", nickname: "Me Lan", role: "GVCN", hobby: "Dạy Văn, Trồng hoa", message: "Chúc các con luôn vững bước trên đường đời", img: "https://images.unsplash.com/photo-1573496359142-b8d7734a5a27?w=400" },
            { id: 2, name: "Thầy Quốc Bảo", nickname: "Bố Bảo", role: "GVCN", hobby: "Toán học, Đá bóng", message: "Hãy tự tin vào chính mình các em nhé", img: "https://images.unsplash.com/photo-1560250097-0b93528c311a?w=400" }
            // Thêm các thành viên khác...
        ];

        const PLAYLIST = [
            { id: 1, title: "Tháng Năm Không Quên", cover: "https://images.unsplash.com/photo-1459749411177-0421800673d6?w=400" }
        ];

        function App() {
            const [currentTrackIndex, setCurrentTrackIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [selectedMember, setSelectedMember] = useState(null);

            return (
                <div className="min-h-screen pb-10">
                    <header className="p-10 text-center">
                        <motion.h1 initial={{y:-20}} animate={{y:0}} className="font-pattaya text-5xl md:text-7xl text-pink-500 mb-2">12A1 Kỷ Niệm</motion.h1>
                        <p className="text-gray-500 italic font-medium">"Thanh xuân là một cơn mưa rào..."</p>
                    </header>

                    {/* Music Player */}
                    <div className="max-w-md mx-auto mb-12 p-6 bg-white/80 backdrop-blur rounded-[32px] shadow-2xl flex items-center gap-5 border border-white">
                        <img src={PLAYLIST[currentTrackIndex].cover} className={`w-20 h-20 rounded-2xl object-cover shadow-lg ${isPlaying ? 'animate-spin-slow' : ''}`} />
                        <div className="flex-1 overflow-hidden">
                            <h4 className="font-bold text-pink-600 truncate text-lg">{PLAYLIST[currentTrackIndex].title}</h4>
                            <div className="flex gap-5 mt-2">
                                <button onClick={() => setIsPlaying(!isPlaying)} className="hover:scale-110 transition">
                                    <Icon name={isPlaying ? "pause" : "play"} className="text-pink-500" size={32} />
                                </button>
                                <button onClick={() => setCurrentTrackIndex((currentTrackIndex + 1) % PLAYLIST.length)} className="hover:scale-110 transition">
                                    <Icon name="skip-forward" className="text-gray-400" size={32} />
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Member List */}
                    <div className="max-w-6xl mx-auto px-4 grid grid-cols-2 md:grid-cols-4 gap-6">
                        {MEMBERS.map((m, idx) => (
                            <motion.div 
                                key={m.id}
                                whileHover={{ scale: 1.03, rotate: 1 }}
                                onClick={() => setSelectedMember(m)}
                                className="bg-white rounded-3xl overflow-hidden shadow-md cursor-pointer border border-pink-50 p-2"
                            >
                                <img src={m.img} className="w-full h-48 object-cover rounded-2xl" />
                                <div className="p-3 text-center">
                                    <h3 className="font-bold text-gray-800 text-lg">{m.name}</h3>
                                    <span className="text-xs bg-pink-100 text-pink-500 px-2 py-0.5 rounded-full font-semibold">{m.role}</span>
                                </div>
                            </motion.div>
                        ))}
                    </div>

                    {/* Popup Chi Tiết */}
                    <AnimatePresence>
                        {selectedMember && (
                            <motion.div 
                                initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
                                className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm"
                                onClick={() => setSelectedMember(null)}
                            >
                                <motion.div 
                                    initial={{scale:0.8, y:20}} animate={{scale:1, y:0}}
                                    className="bg-white rounded-[40px] p-8 max-w-sm w-full text-center relative shadow-2xl border-t-8 border-pink-400"
                                    onClick={e => e.stopPropagation()}
                                >
                                    <img src={selectedMember.img} className="w-32 h-32 rounded-3xl mx-auto mb-4 border-4 border-white shadow-xl object-cover" />
                                    <h2 className="text-2xl font-bold text-gray-800">{selectedMember.name}</h2>
                                    <p className="text-pink-500 font-medium mb-4">"{selectedMember.nickname}"</p>
                                    <div className="bg-pink-50 p-5 rounded-2xl text-gray-600 text-sm italic leading-relaxed">
                                        {selectedMember.message}
                                    </div>
                                    <button onClick={() => setSelectedMember(null)} className="mt-6 w-full py-3 bg-gray-100 rounded-2xl font-bold text-gray-500 hover:bg-gray-200 transition">Đóng</button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Khởi động các icon Lucide
        window.addEventListener('load', () => {
            setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 1000);
        });
    </script>
</body>
</html>
